name: Jira Issue Transition on PR

on:
  pull_request:
    branches:
      - develop  # develop 브랜치로 PR이 열리면 실행

jobs:
  update_jira:
    runs-on: ubuntu-latest

    steps:
      - name: PR 제목에서 JIRA 이슈 키 추출
        id: extract_jira_key
        run: |
          JIRA_KEY=$(echo "${{ github.event.pull_request.title }}" | grep -oE 'KAN[[:space:]]*[0-9]+' | sed 's/ /-/g')
          
          if [ -z "$JIRA_KEY" ]; then
            echo "JIRA 이슈 키를 찾을 수 없습니다."
            exit 1
          fi
          echo "추출된 JIRA 이슈 키: $JIRA_KEY"
          echo "JIRA_KEY=$JIRA_KEY" >> $GITHUB_ENV  # 환경 변수 설정

      - name: JIRA 이슈 상태를 "리뷰 중"으로 변경
        run: |
          curl -X POST "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/$JIRA_KEY/transitions" \
          -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{
            "transition": {
              "id": "2"  # "리뷰 중" 상태의 Transition ID (JIRA에서 확인 필요)
            }
          }'
