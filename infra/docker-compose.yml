networks:
  monitoring:
    driver: bridge

services:
  redis:
    image: redis:latest
    restart: always
    networks:
      - monitoring
    container_name: redis-container
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: [
      "redis-server",
      "--save", "900 1",            # 900초(15분)마다 최소 1개 이상의 변경이 있으면 스냅샷 저장
      "--save", "300 10",           # 300초(5분)마다 최소 10개 이상의 변경이 있으면 저장
      "--save", "60 1000",          # 60초마다 최소 1000개의 변경사항이 있으면 저장
      "--appendonly", "yes",        # AOF 활성화
      "--appendfsync", "everysec", # 1초마다 디스크에 기록
      "--auto-aof-rewrite-percentage", "100",  # AOF 크기가 100% 커지면 리라이트
      "--auto-aof-rewrite-min-size", "64mb"   # AOF 크기가 최소 64MB일 때 리라이트
    ]

  # 🔹 PostgreSQL (Spring Boot가 사용하는 DB)
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    networks:
      - monitoring
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xchangepass
    volumes:
      - postgres_data:/var/lib/postgresql/data  # DB 데이터 유지
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - monitoring
    volumes:
      - mongo_data:/data/db

  # 🔹 InfluxDB (K6 성능 테스트 데이터 저장)
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    restart: always
    networks:
      - monitoring
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    restart: always
    networks:
      - monitoring
    ports:
      - "5672:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # 🔹 Grafana (InfluxDB 데이터 시각화)
  grafana:
    image: grafana/grafana:9.3.8
    container_name: grafana
    restart: always
    depends_on:
      - influxdb
    networks:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./grafana:/etc/grafana/provisioning/

  # 🔹 K6 (성능 테스트 도구)
  k6:
    image: grafana/k6:latest
    container_name: k6
    networks:
      - monitoring
    depends_on:
      - influxdb
      - app
    volumes:
      - ./k6-scripts:/k6-scripts    # K6 스크립트가 있는 디렉토리
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6

  # 🔹 Spring Boot 애플리케이션
  app:
    build: ..
    image: xchangepass-app # 🔥 Spring Boot Docker 이미지명 (직접 빌드해야 함)
    container_name: spring-app
    restart: always
    depends_on:
      - postgres  # DB가 먼저 실행되도록 설정
      - mongodb
      - redis
    networks:
      - monitoring
    ports:
      - "9090:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/xchangepass
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - DB_HOST=influxdb
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/xchangepass

volumes:
  postgres_data:
  redis-data:
  mongo_data: