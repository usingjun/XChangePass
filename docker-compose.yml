networks:
  monitoring:
    driver: bridge

services:
  redis:
    image: redis:latest
    networks:
      - monitoring
    container_name: redis-container
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: [ "redis-server", "--appendonly", "yes" ]

  # 🔹 PostgreSQL (Spring Boot가 사용하는 DB)
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    networks:
      - monitoring
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xchangepass
    volumes:
      - postgres_data:/var/lib/postgresql/data  # DB 데이터 유지
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      retries: 5
      start_period: 10s

  # 🔹 InfluxDB (K6 성능 테스트 데이터 저장)
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    restart: always
    networks:
      - monitoring
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6

  # 🔹 Grafana (InfluxDB 데이터 시각화)
  grafana:
    image: grafana/grafana:9.3.8
    container_name: grafana
    restart: always
    depends_on:
      - influxdb
    networks:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./grafana:/etc/grafana/provisioning/

  # 🔹 K6 (성능 테스트 도구)
  k6:
    image: grafana/k6:latest
    container_name: k6
    networks:
      - monitoring
    depends_on:
      - influxdb
      - app
    volumes:
      - ./k6-scripts:/k6-scripts    # K6 스크립트가 있는 디렉토리
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
    command: ["run", "/k6-scripts/wallet-test.js"]

  # 🔹 Spring Boot 애플리케이션
  app:
    build: .
    image: xchangepass-app # 🔥 Spring Boot Docker 이미지명 (직접 빌드해야 함)
    container_name: spring-app
    restart: always
    depends_on:
      - postgres  # DB가 먼저 실행되도록 설정
      - redis
    networks:
      - monitoring
    ports:
      - "9090:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/xchangepass
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - DB_HOST=influxdb

volumes:
  postgres_data:
  redis-data: